<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YC-Fork Server</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 2rem;
        }
        h1 {
            color: #76d7c4;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
            color: #b3b3b3;
        }
        .code-container {
            background-color: #2c2c2c;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
            text-align: left;
            position: relative;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
        }
        code {
            font-family: "Fira Code", "Courier New", monospace;
            font-size: 0.9rem;
            color: #f0f0f0;
        }
        .copy-button {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .copy-button:hover {
            background-color: #45a049;
        }
        .copy-button:active {
            background-color: #3e8e41;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #888;
        }
        .footer a {
            color: #76d7c4;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YC-Server-Fork is Running</h1>
        <p>Your server is running correctly. Use the installer below on your ComputerCraft computer.</p>

        <div class="code-container">
            <button class="copy-button" onclick="copyInstaller()">Copy</button>
            <pre><code id="installerCode"></code></pre>
        </div>

        <div class="footer">
            <p>See the <a href="https://github.com/YC-Fork/YC-Client-Fork" target="_blank">Client GitHub Repository</a> for more information.</p>
        </div>
    </div>

    <script>
        const codeElement = document.getElementById('installerCode');
        const installerUrl = `${window.location.origin}/installer.lua`;
        codeElement.innerText = `wget run ${installerUrl}`;

        function copyInstaller() {
            const button = document.querySelector('.copy-button');
            navigator.clipboard.writeText(codeElement.innerText).then(() => {
                button.textContent = 'Copied!';
                setTimeout(() => {
                    button.textContent = 'Copy';
                }, 2000);
            }, (err) => {
                console.error('Failed to copy: ', err);
                button.textContent = 'Failed!';
            });
        }
    </script>
</body>
</html>
